<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter — The Original Bug</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
    }

    a { color: #c9a84c; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1e1e1e;
    }
    .nav-brand {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c9a84c;
    }
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-links a {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      padding: 5px 14px;
      border: 1px solid transparent;
      border-radius: 999px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-links a:hover {
      color: #c9a84c;
      border-color: #c9a84c44;
      text-decoration: none;
    }

    #content {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 28px 100px;
    }

    #content h1 {
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9a84c;
      font-weight: 400;
      margin-bottom: 10px;
    }
    #content h3 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.15;
      margin-bottom: 16px;
      font-family: Georgia, serif;
    }
    #content h3 + p em:only-child {
      display: block;
      font-size: 1.1rem;
      color: #888;
      font-style: italic;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    #content hr {
      border: none;
      border-top: 1px solid #1e1e1e;
      margin: 48px 0;
    }
    #content h2 {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9a84c;
      font-weight: 400;
      margin: 48px 0 24px;
    }
    #content p {
      font-size: 1.08rem;
      line-height: 1.9;
      color: #d8d8d8;
      margin-bottom: 1.6em;
    }
    #content blockquote {
      border-left: 2px solid #c9a84c;
      margin: 2em 0;
      padding: 0 0 0 24px;
      color: #c9a84c;
      font-style: italic;
      font-size: 1.1rem;
      line-height: 1.8;
    }
    #content blockquote p { color: #c9a84c; margin-bottom: 0; }
    #content strong { color: #f0f0f0; font-weight: 600; }
    #content em { font-style: italic; color: #e0e0e0; }

    #content > p:last-child {
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: #333;
      text-transform: uppercase;
      margin-top: 60px;
      padding-top: 28px;
      border-top: 1px solid #1a1a1a;
    }

    #loading {
      max-width: 680px;
      margin: 120px auto;
      padding: 0 28px;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
    }

    #error-msg {
      display: none;
      max-width: 680px;
      margin: 120px auto;
      padding: 0 28px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #663333;
    }

    .issue-nav {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 28px 40px;
      display: flex;
      justify-content: space-between;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
    }
    .issue-nav a { color: #c9a84c; }

    footer {
      border-top: 1px solid #1a1a1a;
      padding: 28px 24px;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: #333;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand"><a href="index.html" style="color:#c9a84c;">The Original Bug</a></span>
    <div class="nav-links">
      <a href="index.html">All Chapters</a>
      <a href="book-index.html">Index</a>
      <a href="newsletter.html">Newsletter</a>
      <a href="https://sandybpatterson.github.io/ai-tools-directory/">AI Tools</a>
    </div>
  </nav>

  <div id="loading">Loading…</div>
  <div id="error-msg">Issue not found.</div>
  <div id="content" style="display:none;"></div>

  <div class="issue-nav" id="issue-nav" style="display:none;">
    <span id="prev-link"></span>
    <a href="newsletter.html">↑ All Issues</a>
    <span id="next-link"></span>
  </div>

  <footer>
    &copy; Sandy B. Patterson &mdash; The Original Bug
  </footer>

  <script>
    const issues = {
      '001': { file: 'newsletter_001.md', title: 'Your Name Was the Interview', date: 'July 4, 2026' }
    };

    const ids = Object.keys(issues);
    const params = new URLSearchParams(window.location.search);
    const id = params.get('i');
    const issue = issues[id];

    if (!issue) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
    } else {
      document.title = `${issue.title} — The Original Bug`;

      fetch(issue.file)
        .then(r => {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(md => {
          document.getElementById('loading').style.display = 'none';
          const el = document.getElementById('content');
          el.innerHTML = marked.parse(md);
          el.style.display = 'block';

          const nav = document.getElementById('issue-nav');
          nav.style.display = 'flex';
          const idx = ids.indexOf(id);
          if (ids[idx + 1]) {
            document.getElementById('prev-link').innerHTML =
              `<a href="newsletter-post.html?i=${ids[idx + 1]}">← Older</a>`;
          }
          if (ids[idx - 1]) {
            document.getElementById('next-link').innerHTML =
              `<a href="newsletter-post.html?i=${ids[idx - 1]}">Newer →</a>`;
          }
        })
        .catch(() => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error-msg').style.display = 'block';
        });
    }
  </script>

</body>
</html>
