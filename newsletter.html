<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter — The Original Bug</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
    }

    a { color: #c9a84c; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1e1e1e;
    }
    .nav-brand {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c9a84c;
    }
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-links a {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      padding: 5px 14px;
      border: 1px solid transparent;
      border-radius: 999px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: #c9a84c;
      border-color: #c9a84c44;
      text-decoration: none;
    }

    .page-header {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 28px 48px;
    }
    .eyebrow {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 16px;
    }
    .page-header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .page-header .subtitle {
      font-size: 1.05rem;
      color: #888;
      font-style: italic;
      line-height: 1.6;
    }

    .substack-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 28px 56px;
    }
    .substack-wrap iframe {
      width: 100%;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      display: block;
    }

    .issues-section {
      padding: 0 0 80px;
    }
    .section-label {
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #555;
      max-width: 680px;
      margin: 0 auto 24px;
      padding: 0 28px;
    }

    .issues-strip {
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
      padding-bottom: 12px;
    }
    .issues-strip::-webkit-scrollbar { height: 4px; }
    .issues-strip::-webkit-scrollbar-track { background: transparent; }
    .issues-strip::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .issues-track {
      display: flex;
      gap: 16px;
      /* left padding centers the first card; right padding for breathing room */
      padding: 4px 60px 4px calc(50vw - 148px);
    }

    .issue-card {
      flex-shrink: 0;
      width: 280px;
      padding: 24px;
      background: #111111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
      display: block;
    }
    .issue-card:hover {
      border-color: #c9a84c44;
      background: #141414;
      text-decoration: none;
    }

    .issue-date {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: #c9a84c;
      margin-bottom: 12px;
    }
    .issue-title {
      font-family: Georgia, serif;
      font-size: 1.05rem;
      color: #e8e8e8;
      line-height: 1.35;
      margin-bottom: 10px;
    }
    .issue-subtitle {
      font-family: Georgia, serif;
      font-size: 0.82rem;
      color: #666;
      font-style: italic;
      line-height: 1.5;
    }

    footer {
      border-top: 1px solid #1a1a1a;
      padding: 28px 24px;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: #333;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand"><a href="index.html" style="color:#c9a84c;">The Original Bug</a></span>
    <div class="nav-links">
      <a href="index.html">All Chapters</a>
      <a href="book-index.html">Index</a>
      <a href="newsletter.html" class="active">Newsletter</a>
      <a href="https://sandybpatterson.github.io/ai-tools-directory/">AI Tools</a>
    </div>
  </nav>

  <div class="page-header">
    <p class="eyebrow">The Original Bug</p>
    <h1>Newsletter</h1>
    <p class="subtitle">Field notes on AI and the human mind behind it.</p>
  </div>

  <div class="substack-wrap">
    <iframe src="https://sandybpatterson.substack.com/embed"
      height="180"
      frameborder="0"
      scrolling="no"></iframe>
  </div>

  <div class="issues-section">
    <p class="section-label">All Issues</p>
    <div class="issues-strip">
      <div class="issues-track" id="issues-track"></div>
    </div>
  </div>

  <footer>
    &copy; Sandy B. Patterson &mdash; The Original Bug
  </footer>

  <script>
    const issues = [
      {
        id: '001',
        date: 'July 4, 2026',
        title: 'Your Name Was the Interview',
        subtitle: 'The algorithm decided before you typed a single word.'
      }
    ];

    const track = document.getElementById('issues-track');

    issues.forEach(issue => {
      const card = document.createElement('a');
      card.href = `newsletter-post.html?i=${issue.id}`;
      card.className = 'issue-card';
      card.innerHTML = `
        <div class="issue-date">${issue.date}</div>
        <div class="issue-title">${issue.title}</div>
        <div class="issue-subtitle">${issue.subtitle}</div>
      `;
      track.appendChild(card);
    });

    // Center the first (most recent) card on load
    const strip = document.querySelector('.issues-strip');
    const first = track.firstElementChild;
    if (strip && first) {
      strip.scrollLeft = first.offsetLeft - (strip.clientWidth / 2) + (first.offsetWidth / 2);
    }
  </script>

</body>
</html>
